<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ورود ادمین · Roof</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="shell" style="display:flex;min-height:80vh;align-items:center;justify-content:center">
    <section class="card card-pad" style="max-width:420px;width:100%">
      <div style="text-align:center;margin-bottom:20px">
        <span class="brand-mark" style="margin:0 auto 14px"><svg viewBox="0 0 24 24" fill="none" stroke="#EFEAE4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12.5L12 5l8 7.5"/><path d="M6.5 10.7V19h11v-8.3"/></svg></span>
        <span class="brand-word" style="font-size:24px">Roof</span>
        <p style="color:var(--deep-taupe);font-size:12.5px;margin-top:4px;opacity:.8">پنل مدیریت</p>
      </div>
      <div class="form-grid">
        <div class="field"><label>ایمیل</label><input id="email" value="admin@roof.local"></div>
        <div class="field"><label>رمز عبور</label><input id="password" type="password" value="Admin123456"></div>
        <button id="login" class="primary-btn">ورود به پنل</button>
        <div id="notice"></div>
      </div>
      <div style="text-align:center;margin-top:16px"><a href="/" style="color:var(--deep-taupe);font-size:13px;opacity:.75">بازگشت به سایت</a></div>
    </section>
  </main>
  <script type="module" src="/js/admin-login.js"></script>
</body>
</html>
